        <h1 id="ARIMA模型"><a href="#ARIMA模型" class="headerlink" title="ARIMA模型"></a>ARIMA模型</h1><h2 id="模型作用"><a href="#模型作用" class="headerlink" title="模型作用"></a>模型作用</h2><p>ARIMA 模型是最常见的一种用来进行时间序列预测的模型。</p>
<h2 id="模型案例"><a href="#模型案例" class="headerlink" title="模型案例"></a>模型案例</h2><p>基于 1985-2021 年某杂志的销售量，预测某商品的未来五年的销售量。</p>
<h2 id="模型代码"><a href="#模型代码" class="headerlink" title="模型代码"></a>模型代码</h2><figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br><span class="line">98</span><br><span class="line">99</span><br><span class="line">100</span><br><span class="line">101</span><br><span class="line">102</span><br><span class="line">103</span><br><span class="line">104</span><br><span class="line">105</span><br><span class="line">106</span><br><span class="line">107</span><br><span class="line">108</span><br><span class="line">109</span><br><span class="line">110</span><br><span class="line">111</span><br><span class="line">112</span><br><span class="line">113</span><br><span class="line">114</span><br><span class="line">115</span><br><span class="line">116</span><br><span class="line">117</span><br><span class="line">118</span><br><span class="line">119</span><br><span class="line">120</span><br><span class="line">121</span><br><span class="line">122</span><br><span class="line">123</span><br><span class="line">124</span><br><span class="line">125</span><br><span class="line">126</span><br><span class="line">127</span><br><span class="line">128</span><br><span class="line">129</span><br><span class="line">130</span><br><span class="line">131</span><br><span class="line">132</span><br><span class="line">133</span><br><span class="line">134</span><br><span class="line">135</span><br><span class="line">136</span><br><span class="line">137</span><br><span class="line">138</span><br><span class="line">139</span><br><span class="line">140</span><br><span class="line">141</span><br><span class="line">142</span><br><span class="line">143</span><br><span class="line">144</span><br><span class="line">145</span><br><span class="line">146</span><br><span class="line">147</span><br><span class="line">148</span><br><span class="line">149</span><br><span class="line">150</span><br><span class="line">151</span><br><span class="line">152</span><br><span class="line">153</span><br><span class="line">154</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">import</span> pandas </span><br><span class="line">  </span><br><span class="line"><span class="comment"># 读取数据，指定日期为索引列</span></span><br><span class="line">  </span><br><span class="line">data = pandas.read_csv(</span><br><span class="line">    <span class="string">&#x27;D:\\DATA\\pycase\\number2\\9.3\\Data.csv&#x27;</span> ,</span><br><span class="line">    index_col=<span class="string">&#x27;日期&#x27;</span></span><br><span class="line">)</span><br><span class="line">  </span><br><span class="line"><span class="comment"># 绘图过程中</span></span><br><span class="line">  </span><br><span class="line"><span class="keyword">import</span>  matplotlib.pyplot <span class="keyword">as</span> plt</span><br><span class="line">  </span><br><span class="line"><span class="comment"># 用来正常显示中文标签</span></span><br><span class="line">  </span><br><span class="line">plt.rcParams[<span class="string">&#x27;font.sans-serif&#x27;</span>]=[<span class="string">&#x27;SimHei&#x27;</span>]</span><br><span class="line">  </span><br><span class="line"><span class="comment"># 用来正常显示负号</span></span><br><span class="line">  </span><br><span class="line">plt.rcParams[<span class="string">&#x27;axes.unicode_minus&#x27;</span>] = <span class="literal">False</span> </span><br><span class="line">  </span><br><span class="line"><span class="comment"># 查看趋势图</span></span><br><span class="line">data.plot() <span class="comment">#有增长趋势，不平稳</span></span><br><span class="line">  </span><br><span class="line">  </span><br><span class="line"><span class="comment"># 附加：查看自相关系数合片自相关系数（查分之后），可以用于平稳性的检测，也可用于定阶系数预估</span></span><br><span class="line">  </span><br><span class="line"><span class="comment">#自相关图（）</span></span><br><span class="line">  </span><br><span class="line"><span class="keyword">from</span> statsmodels.graphics.tsaplots <span class="keyword">import</span> plot_acf</span><br><span class="line">  </span><br><span class="line">plot_acf(data).show() <span class="comment">#自相关图既不是拖尾也不是截尾。以上的图的自相关是一个三角对称的形式，这种趋势是单调趋势的典型图形，说明这个序列不是平稳序列</span></span><br><span class="line">  </span><br><span class="line">  </span><br><span class="line">  </span><br><span class="line">  </span><br><span class="line">  </span><br><span class="line"><span class="comment"># 1 平稳性检测</span></span><br><span class="line">  </span><br><span class="line"><span class="keyword">from</span> statsmodels.tsa.stattools <span class="keyword">import</span> adfuller <span class="keyword">as</span> ADF</span><br><span class="line">  </span><br><span class="line">  </span><br><span class="line"><span class="keyword">def</span> <span class="title function_">tagADF</span>(<span class="params">t</span>):</span><br><span class="line">    result = pandas.DataFrame(index=[</span><br><span class="line">            <span class="string">&quot;Test Statistic Value&quot;</span>, <span class="string">&quot;p-value&quot;</span>, <span class="string">&quot;Lags Used&quot;</span>, </span><br><span class="line">            <span class="string">&quot;Number of Observations Used&quot;</span>, </span><br><span class="line">            <span class="string">&quot;Critical Value(1%)&quot;</span>, <span class="string">&quot;Critical Value(5%)&quot;</span>, <span class="string">&quot;Critical Value(10%)&quot;</span></span><br><span class="line">        ], columns=[<span class="string">&#x27;销量&#x27;</span>]</span><br><span class="line">    );</span><br><span class="line">    result[<span class="string">&#x27;销量&#x27;</span>][<span class="string">&#x27;Test Statistic Value&#x27;</span>] = t[<span class="number">0</span>]</span><br><span class="line">    result[<span class="string">&#x27;销量&#x27;</span>][<span class="string">&#x27;p-value&#x27;</span>] = t[<span class="number">1</span>]</span><br><span class="line">    result[<span class="string">&#x27;销量&#x27;</span>][<span class="string">&#x27;Lags Used&#x27;</span>] = t[<span class="number">2</span>]</span><br><span class="line">    result[<span class="string">&#x27;销量&#x27;</span>][<span class="string">&#x27;Number of Observations Used&#x27;</span>] = t[<span class="number">3</span>]</span><br><span class="line">    result[<span class="string">&#x27;销量&#x27;</span>][<span class="string">&#x27;Critical Value(1%)&#x27;</span>] = t[<span class="number">4</span>][<span class="string">&#x27;1%&#x27;</span>]</span><br><span class="line">    result[<span class="string">&#x27;销量&#x27;</span>][<span class="string">&#x27;Critical Value(5%)&#x27;</span>] = t[<span class="number">4</span>][<span class="string">&#x27;5%&#x27;</span>]</span><br><span class="line">    result[<span class="string">&#x27;销量&#x27;</span>][<span class="string">&#x27;Critical Value(10%)&#x27;</span>] = t[<span class="number">4</span>][<span class="string">&#x27;10%&#x27;</span>]</span><br><span class="line">    <span class="keyword">return</span> result;</span><br><span class="line">  </span><br><span class="line">  </span><br><span class="line"><span class="built_in">print</span>(<span class="string">&#x27;原始序列的ADF检验结果为:&#x27;</span>,tagADF(ADF(data[<span class="string">u&#x27;销量&#x27;</span>])))  <span class="comment"># 添加标签后展现</span></span><br><span class="line">  </span><br><span class="line"><span class="comment"># 平稳判断：得到统计量大于三个置信度(1%,5%,10%)临界统计值，p值显著大于0.05，该序列为非平稳序列。</span></span><br><span class="line"><span class="comment"># 备注：得到的统计量显著小于3个置信度（1%，5%，10%）的临界统计值时，为平稳 此时p值接近于0 此处不为0，尝试增加数据量，原数据太少</span></span><br><span class="line">  </span><br><span class="line"><span class="comment"># 2 进行数据差分，一般一阶差分就可以</span></span><br><span class="line">  </span><br><span class="line">D_data = data.diff(<span class="number">1</span>).dropna()</span><br><span class="line">D_data.columns = [<span class="string">u&#x27;销量差分&#x27;</span>]</span><br><span class="line">  </span><br><span class="line"><span class="comment">#差分图趋势查看</span></span><br><span class="line">  </span><br><span class="line">D_data.plot() </span><br><span class="line">plt.show()</span><br><span class="line">  </span><br><span class="line"><span class="comment"># 附加：查看自相关系数合片自相关系数（查分之后），可以用于平稳性的检测，也可用于定阶系数预估</span></span><br><span class="line">  </span><br><span class="line"><span class="comment">#自相关图</span></span><br><span class="line">  </span><br><span class="line">plot_acf(D_data).show()</span><br><span class="line">  </span><br><span class="line">plt.show()</span><br><span class="line">  </span><br><span class="line"><span class="comment">#偏自相关图</span></span><br><span class="line">  </span><br><span class="line"><span class="keyword">from</span> statsmodels.graphics.tsaplots <span class="keyword">import</span> plot_pacf</span><br><span class="line">  </span><br><span class="line">plot_pacf(D_data).show()</span><br><span class="line">  </span><br><span class="line"><span class="comment"># 3 平稳性检测</span></span><br><span class="line">  </span><br><span class="line"><span class="built_in">print</span>(<span class="string">u&#x27;差分序列的ADF检验结果为：&#x27;</span>, tagADF(ADF(D_data[<span class="string">u&#x27;销量差分&#x27;</span>]))) </span><br><span class="line">  </span><br><span class="line"><span class="comment"># 解释：Test Statistic Value值小于两个水平值，p值显著小于0.05，一阶差分后序列为平稳序列。</span></span><br><span class="line">  </span><br><span class="line"><span class="comment"># 4 白噪声检验</span></span><br><span class="line"><span class="keyword">from</span> statsmodels.stats.diagnostic <span class="keyword">import</span> acorr_ljungbox</span><br><span class="line">  </span><br><span class="line"><span class="comment">#返回统计量和p值</span></span><br><span class="line">  </span><br><span class="line"><span class="built_in">print</span>(<span class="string">u&#x27;差分序列的白噪声检验结果为：&#x27;</span>, acorr_ljungbox(D_data, lags=<span class="number">1</span>))  <span class="comment"># 分别为stat值（统计量）和P值</span></span><br><span class="line">  </span><br><span class="line"><span class="comment"># P值小于0.05，所以一阶差分后的序列为平稳非白噪声序列。</span></span><br><span class="line">  </span><br><span class="line">  </span><br><span class="line"><span class="comment"># 5 p，q定阶</span></span><br><span class="line">  </span><br><span class="line"><span class="keyword">from</span> statsmodels.tsa.arima_model <span class="keyword">import</span> ARIMA</span><br><span class="line">  </span><br><span class="line"><span class="comment">#一般阶数不超过length/10</span></span><br><span class="line">  </span><br><span class="line">pmax = <span class="built_in">int</span>(<span class="built_in">len</span>(D_data)/<span class="number">10</span>) </span><br><span class="line">  </span><br><span class="line">  </span><br><span class="line"><span class="comment">#一般阶数不超过length/10</span></span><br><span class="line">  </span><br><span class="line">qmax = <span class="built_in">int</span>(<span class="built_in">len</span>(D_data)/<span class="number">10</span>) </span><br><span class="line">  </span><br><span class="line"><span class="comment">#bic矩阵</span></span><br><span class="line">  </span><br><span class="line">bic_matrix = [] </span><br><span class="line"><span class="keyword">for</span> p <span class="keyword">in</span> <span class="built_in">range</span>(pmax+<span class="number">1</span>):</span><br><span class="line">  tmp = []</span><br><span class="line">  <span class="keyword">for</span> q <span class="keyword">in</span> <span class="built_in">range</span>(qmax+<span class="number">1</span>):</span><br><span class="line"><span class="comment">#存在部分报错，所以用try来跳过报错。</span></span><br><span class="line">    <span class="keyword">try</span>: </span><br><span class="line">      tmp.append(ARIMA(data, (p,<span class="number">1</span>,q)).fit().bic)</span><br><span class="line">    <span class="keyword">except</span>:</span><br><span class="line">      tmp.append(<span class="literal">None</span>)</span><br><span class="line">  bic_matrix.append(tmp)</span><br><span class="line">  </span><br><span class="line"><span class="comment">#从中可以找出最小值</span></span><br><span class="line">  </span><br><span class="line">bic_matrix = pandas.DataFrame(bic_matrix) </span><br><span class="line">  </span><br><span class="line"><span class="comment">#先用stack展平，然后用idxmin找出最小值位置。</span></span><br><span class="line">  </span><br><span class="line">p,q = bic_matrix.stack().idxmin() </span><br><span class="line">  </span><br><span class="line">  </span><br><span class="line">  </span><br><span class="line"><span class="built_in">print</span>(<span class="string">u&#x27;BIC最小的p值和q值为：%s、%s&#x27;</span> %(p,q))</span><br><span class="line"><span class="comment"># 取BIC信息量达到最小的模型阶数，结果p为0，q为1，定阶完成。</span></span><br><span class="line">  </span><br><span class="line"><span class="comment"># 6 建立模型和预测</span></span><br><span class="line">  </span><br><span class="line">model = ARIMA(data, (p,<span class="number">1</span>,q)).fit() </span><br><span class="line">  </span><br><span class="line"><span class="comment">#给出一份模型报告</span></span><br><span class="line">  </span><br><span class="line">model.summary2() </span><br><span class="line">  </span><br><span class="line"><span class="comment">#作为期5天的预测，返回预测结果、标准误差、置信区间。</span></span><br><span class="line">  </span><br><span class="line">model.forecast(<span class="number">5</span>)</span><br></pre></td></tr></table></figure>
